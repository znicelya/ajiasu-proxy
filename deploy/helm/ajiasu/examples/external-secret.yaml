# Example only. Install External Secrets Operator separately and bind this
# object to your Vault/KMS provider. No secret values belong in this file.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ajiasu-runtime
spec:
  refreshInterval: 1h
  secretStoreRef: { name: production-vault, kind: ClusterSecretStore }
  target: { name: ajiasu-runtime, creationPolicy: Owner }
  data:
  - { secretKey: database-normal-dsn, remoteRef: { key: ajiasu/database-normal-dsn } }
  - { secretKey: database-platform-dsn, remoteRef: { key: ajiasu/database-platform-dsn } }
  - { secretKey: database-migration-dsn, remoteRef: { key: ajiasu/database-migration-dsn } }
  - { secretKey: redis-password, remoteRef: { key: ajiasu/redis-password } }
  - { secretKey: oidc-client-secret, remoteRef: { key: ajiasu/oidc-client-secret } }
  - { secretKey: control-plane-keyring, remoteRef: { key: ajiasu/control-plane-keyring } }
  - { secretKey: route-signing-key, remoteRef: { key: ajiasu/route-signing-key } }
  - { secretKey: route-verifying-key, remoteRef: { key: ajiasu/route-verifying-key } }
  - { secretKey: platform-ca, remoteRef: { key: ajiasu/platform-ca } }
  - { secretKey: control-plane-cert, remoteRef: { key: ajiasu/control-plane-cert } }
  - { secretKey: control-plane-key, remoteRef: { key: ajiasu/control-plane-key } }
  - { secretKey: gateway-ca, remoteRef: { key: ajiasu/gateway-ca } }
  - { secretKey: gateway-cert, remoteRef: { key: ajiasu/gateway-cert } }
  - { secretKey: gateway-key, remoteRef: { key: ajiasu/gateway-key } }
  - { secretKey: agent-ca, remoteRef: { key: ajiasu/agent-ca } }
  - { secretKey: agent-cert, remoteRef: { key: ajiasu/agent-cert } }
  - { secretKey: agent-key, remoteRef: { key: ajiasu/agent-key } }
  - { secretKey: agent-relay-cert, remoteRef: { key: ajiasu/agent-relay-cert } }
  - { secretKey: agent-relay-key, remoteRef: { key: ajiasu/agent-relay-key } }
  - { secretKey: agent-relay-ca, remoteRef: { key: ajiasu/agent-relay-ca } }
