apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ajiasu.fullname" . }}-control-plane
  labels: { app.kubernetes.io/component: control-plane }
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app.kubernetes.io/name: {{ include "ajiasu.name" . }}, app.kubernetes.io/component: control-plane } }
  template:
    metadata: { labels: { app.kubernetes.io/name: {{ include "ajiasu.name" . }}, app.kubernetes.io/component: control-plane } }
    spec:
      serviceAccountName: {{ include "ajiasu.fullname" . }}-control-plane
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      {{- if .Values.controlPlane.topologySpread }}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector: { matchLabels: { app.kubernetes.io/name: {{ include "ajiasu.name" . }}, app.kubernetes.io/component: control-plane } }
      {{- end }}
      containers:
      - name: control-plane
        image: {{ include "ajiasu.image" .Values.images.controlPlane }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        envFrom: [{ configMapRef: { name: {{ include "ajiasu.fullname" . }}-config } }]
        env:
        - { name: AJIASU_DATABASE_NORMAL_DSN_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.databaseNormalDsn }} }
        - { name: AJIASU_DATABASE_PLATFORM_DSN_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.databasePlatformDsn }} }
        - { name: AJIASU_REDIS_PASSWORD_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.redisPassword }} }
        - { name: AJIASU_REDIS_ADDRESS, value: {{ printf "%s:%v" .Values.redis.external.host .Values.redis.external.port | quote }} }
        - { name: AJIASU_REDIS_USERNAME, value: {{ .Values.controlPlane.config.redisUsername | quote }} }
        - { name: AJIASU_REDIS_DATABASE, value: {{ .Values.controlPlane.config.redisDatabase | quote }} }
        - { name: AJIASU_REDIS_TLS, value: {{ .Values.controlPlane.config.redisTls | quote }} }
        - { name: AJIASU_OIDC_ISSUER, value: {{ .Values.controlPlane.config.oidcIssuer | quote }} }
        - { name: AJIASU_OIDC_CLIENT_ID, value: {{ .Values.controlPlane.config.oidcClientId | quote }} }
        - { name: AJIASU_OIDC_REDIRECT_URL, value: {{ .Values.controlPlane.config.oidcRedirectUrl | quote }} }
        - { name: AJIASU_OIDC_CLIENT_SECRET_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.oidcClientSecret }} }
        - { name: AJIASU_KEYRING_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.keyring }} }
        - { name: AJIASU_ROUTE_SIGNING_KEY_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.routeSigningKey }} }
        - { name: AJIASU_AGENT_GRPC_BIND, value: {{ .Values.controlPlane.config.agentGrpcBind | quote }} }
        - { name: AJIASU_GATEWAY_GRPC_BIND, value: {{ .Values.controlPlane.config.gatewayGrpcBind | quote }} }
        - { name: AJIASU_AGENT_GRPC_CERT_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.controlPlaneCert }} }
        - { name: AJIASU_AGENT_GRPC_KEY_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.controlPlaneKey }} }
        - { name: AJIASU_AGENT_GRPC_CLIENT_CA_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.controlPlaneCa }} }
        - { name: AJIASU_GATEWAY_GRPC_CERT_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.controlPlaneCert }} }
        - { name: AJIASU_GATEWAY_GRPC_KEY_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.controlPlaneKey }} }
        - { name: AJIASU_GATEWAY_GRPC_CLIENT_CA_FILE, value: /run/secrets/ajiasu/{{ .Values.secrets.keys.controlPlaneCa }} }
        ports: [{ name: http, containerPort: 8080 }, { name: agent-grpc, containerPort: 9090 }, { name: gateway-grpc, containerPort: 9091 }]
        readinessProbe: { httpGet: { path: /readyz, port: http }, periodSeconds: 5, failureThreshold: 6 }
        livenessProbe: { httpGet: { path: /livez, port: http }, periodSeconds: 10 }
        resources: {{- toYaml .Values.controlPlane.resources | nindent 10 }}
        securityContext:
          {{- include "ajiasu.containerSecurityContext" . | nindent 10 }}
        lifecycle: { preStop: { exec: { command: ["/bin/sh", "-c", "sleep 5"] } } }
        volumeMounts: [{ name: secrets, mountPath: /run/secrets/ajiasu, readOnly: true }]
      volumes: [{ name: secrets, secret: { secretName: {{ .Values.secrets.existingSecret | quote }} } }]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ajiasu.fullname" . }}-control-plane
spec:
  type: {{ .Values.exposure.controlPlane }}
  selector: { app.kubernetes.io/name: {{ include "ajiasu.name" . }}, app.kubernetes.io/component: control-plane }
  ports: [{ name: http, port: {{ .Values.controlPlane.service.port }}, targetPort: http }, { name: agent-grpc, port: {{ .Values.controlPlane.service.agentGrpcPort }}, targetPort: agent-grpc }, { name: gateway-grpc, port: {{ .Values.controlPlane.service.gatewayGrpcPort }}, targetPort: gateway-grpc }]
