apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: {{ include "ajiasu.fullname" . }}-agent }
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: {{ include "ajiasu.fullname" . }}-agent }
subjects: [{ kind: ServiceAccount, name: {{ include "ajiasu.fullname" . }}-agent }]
roleRef: { kind: Role, name: {{ include "ajiasu.fullname" . }}-agent, apiGroup: rbac.authorization.k8s.io }
