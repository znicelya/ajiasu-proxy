{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ajiasu.fullname" . }}-control-plane
  labels:
    {{- include "ajiasu.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ajiasu.fullname" . }}-agent
  labels:
    {{- include "ajiasu.labels" . | nindent 4 }}
{{- end }}
