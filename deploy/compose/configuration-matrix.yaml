revision: 1
deployment_modes:
  - development
  - single-host
  - external-dependencies
owners:
  - release
  - control-plane
  - gateway
  - agent
  - lifecycle
configurations:
  - name: AJIASU_ENVIRONMENT
    owner: control-plane
    container_environment: AJIASU_ENVIRONMENT
    secret_mount: null
    default_policy: deployment_mode
    modes: [development, single-host, external-dependencies]
    helm_value: global.environment
  - name: AJIASU_RELEASE_MANIFEST
    owner: release
    container_environment: null
    secret_mount: null
    default_policy: required
    modes: [development, single-host, external-dependencies]
    helm_value: global.releaseManifest
  - name: AJIASU_ENVIRONMENT_ID
    owner: lifecycle
    container_environment: AJIASU_ENVIRONMENT_ID
    secret_mount: null
    default_policy: generated_once
    modes: [development, single-host, external-dependencies]
    helm_value: global.environmentId
  - name: AJIASU_HEALTH_ENDPOINT
    owner: lifecycle
    container_environment: null
    secret_mount: null
    default_policy: loopback_component_endpoint
    modes: [development, single-host, external-dependencies]
    helm_value: health.endpoint
  - name: AJIASU_HEALTH_TIMEOUT
    owner: lifecycle
    container_environment: null
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: health.timeout
  - name: AJIASU_MIGRATIONS_DIRECTORY
    owner: lifecycle
    container_environment: AJIASU_MIGRATIONS_DIRECTORY
    secret_mount: null
    default_policy: image_default
    modes: [development, single-host, external-dependencies]
    helm_value: migrations.directory
  - name: AJIASU_MIGRATION_TIMEOUT
    owner: lifecycle
    container_environment: AJIASU_MIGRATION_TIMEOUT
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: migrations.timeout
  - name: AJIASU_HTTP_BIND
    owner: control-plane
    container_environment: AJIASU_HTTP_BIND
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.http.bind
  - name: AJIASU_AGENT_GRPC_BIND
    owner: control-plane
    container_environment: AJIASU_AGENT_GRPC_BIND
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.agentGrpc.bind
  - name: AJIASU_AGENT_GRPC_INSECURE
    owner: control-plane
    container_environment: AJIASU_AGENT_GRPC_INSECURE
    secret_mount: null
    default_policy: development_only
    modes: [development]
    helm_value: controlPlane.agentGrpc.insecure
  - name: AJIASU_AGENT_GRPC_CERT_FILE
    owner: control-plane
    container_environment: AJIASU_AGENT_GRPC_CERT_FILE
    secret_mount: null
    default_policy: required_production_file
    modes: [single-host, external-dependencies]
    helm_value: controlPlane.agentGrpc.certificatePath
  - name: AJIASU_AGENT_GRPC_KEY_FILE
    owner: control-plane
    container_environment: AJIASU_AGENT_GRPC_KEY_FILE
    secret_mount: null
    default_policy: required_production_file
    modes: [single-host, external-dependencies]
    helm_value: controlPlane.agentGrpc.privateKeyPath
  - name: AJIASU_GATEWAY_GRPC_BIND
    owner: control-plane
    container_environment: AJIASU_GATEWAY_GRPC_BIND
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.gatewayGrpc.bind
  - name: AJIASU_GATEWAY_GRPC_INSECURE
    owner: control-plane
    container_environment: AJIASU_GATEWAY_GRPC_INSECURE
    secret_mount: null
    default_policy: development_only
    modes: [development]
    helm_value: controlPlane.gatewayGrpc.insecure
  - name: AJIASU_GATEWAY_GRPC_CERT_FILE
    owner: control-plane
    container_environment: AJIASU_GATEWAY_GRPC_CERT_FILE
    secret_mount: null
    default_policy: required_production_file
    modes: [single-host, external-dependencies]
    helm_value: controlPlane.gatewayGrpc.certificatePath
  - name: AJIASU_GATEWAY_GRPC_KEY_FILE
    owner: control-plane
    container_environment: AJIASU_GATEWAY_GRPC_KEY_FILE
    secret_mount: null
    default_policy: required_production_file
    modes: [single-host, external-dependencies]
    helm_value: controlPlane.gatewayGrpc.privateKeyPath
  - name: AJIASU_DATABASE_NORMAL_DSN_FILE
    owner: control-plane
    container_environment: AJIASU_DATABASE_NORMAL_DSN_FILE
    secret_mount: /run/secrets/ajiasu/database-normal-dsn
    default_policy: required_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.database.normalDsnSecretKey
  - name: AJIASU_DATABASE_PLATFORM_DSN_FILE
    owner: control-plane
    container_environment: AJIASU_DATABASE_PLATFORM_DSN_FILE
    secret_mount: /run/secrets/ajiasu/database-platform-dsn
    default_policy: required_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.database.platformDsnSecretKey
  - name: AJIASU_DATABASE_MIGRATION_DSN_FILE
    owner: lifecycle
    container_environment: AJIASU_DATABASE_MIGRATION_DSN_FILE
    secret_mount: /run/secrets/ajiasu/database-migration-dsn
    default_policy: required_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: migrations.databaseDsnSecretKey
  - name: AJIASU_REDIS_PASSWORD_FILE
    owner: control-plane
    container_environment: AJIASU_REDIS_PASSWORD_FILE
    secret_mount: /run/secrets/ajiasu/redis-password
    default_policy: required_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.redis.passwordSecretKey
  - name: AJIASU_OIDC_CLIENT_SECRET_FILE
    owner: control-plane
    container_environment: AJIASU_OIDC_CLIENT_SECRET_FILE
    secret_mount: /run/secrets/ajiasu/oidc-client-secret
    default_policy: required_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.oidc.clientSecretKey
  - name: AJIASU_KEYRING_FILE
    owner: control-plane
    container_environment: AJIASU_KEYRING_FILE
    secret_mount: /run/secrets/ajiasu/control-plane-keyring
    default_policy: generated_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.keyring.secretKey
  - name: AJIASU_ROUTE_SIGNING_KEY_FILE
    owner: control-plane
    container_environment: AJIASU_ROUTE_SIGNING_KEY_FILE
    secret_mount: /run/secrets/ajiasu/route-signing-key
    default_policy: generated_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: controlPlane.routeSigning.secretKey
  - name: AJIASU_GATEWAY_HTTP_LISTEN
    owner: gateway
    container_environment: AJIASU_GATEWAY_HTTP_LISTEN
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.listeners.http
  - name: AJIASU_GATEWAY_NAME
    owner: gateway
    container_environment: AJIASU_GATEWAY_NAME
    secret_mount: null
    default_policy: generated_from_environment_id
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.name
  - name: AJIASU_GATEWAY_SOCKS5_LISTEN
    owner: gateway
    container_environment: AJIASU_GATEWAY_SOCKS5_LISTEN
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.listeners.socks5
  - name: AJIASU_GATEWAY_CONTROL_PLANE_ENDPOINT
    owner: gateway
    container_environment: AJIASU_GATEWAY_CONTROL_PLANE_ENDPOINT
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.controlPlaneEndpoint
  - name: AJIASU_GATEWAY_RELAY_ENDPOINT
    owner: gateway
    container_environment: AJIASU_GATEWAY_RELAY_ENDPOINT
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.relayEndpoint
  - name: AJIASU_GATEWAY_ROUTE_VERIFYING_KEY_FILE
    owner: gateway
    container_environment: AJIASU_GATEWAY_ROUTE_VERIFYING_KEY_FILE
    secret_mount: null
    default_policy: generated_public_key_file
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.routeVerifyingKey.path
  - name: AJIASU_GATEWAY_CERTIFICATE_FINGERPRINT
    owner: gateway
    container_environment: AJIASU_GATEWAY_CERTIFICATE_FINGERPRINT
    secret_mount: null
    default_policy: derived_from_certificate
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.controlPlaneCertificateFingerprint
  - name: AJIASU_GATEWAY_CA_FILE
    owner: gateway
    container_environment: AJIASU_GATEWAY_CA_FILE
    secret_mount: null
    default_policy: generated_ca_file
    modes: [single-host, external-dependencies]
    helm_value: gateway.tls.caPath
  - name: AJIASU_GATEWAY_CERT_FILE
    owner: gateway
    container_environment: AJIASU_GATEWAY_CERT_FILE
    secret_mount: null
    default_policy: generated_certificate_file
    modes: [single-host, external-dependencies]
    helm_value: gateway.tls.certificatePath
  - name: AJIASU_GATEWAY_KEY_FILE
    owner: gateway
    container_environment: AJIASU_GATEWAY_KEY_FILE
    secret_mount: /run/secrets/ajiasu/gateway-private-key
    default_policy: generated_secret_file
    modes: [single-host, external-dependencies]
    helm_value: gateway.tls.privateKeySecretKey
  - name: AJIASU_GATEWAY_STATE_DIRECTORY
    owner: gateway
    container_environment: AJIASU_GATEWAY_STATE_DIRECTORY
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.state.mountPath
  - name: AJIASU_GATEWAY_MAX_HEADER_BYTES
    owner: gateway
    container_environment: AJIASU_GATEWAY_MAX_HEADER_BYTES
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.limits.maxHeaderBytes
  - name: AJIASU_GATEWAY_MAX_CONNECTIONS
    owner: gateway
    container_environment: AJIASU_GATEWAY_MAX_CONNECTIONS
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.limits.maxConnections
  - name: AJIASU_GATEWAY_SHUTDOWN_TIMEOUT
    owner: gateway
    container_environment: AJIASU_GATEWAY_SHUTDOWN_TIMEOUT
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.shutdownTimeout
  - name: AJIASU_GATEWAY_ENROLLMENT_TOKEN_FILE
    owner: gateway
    container_environment: AJIASU_GATEWAY_ENROLLMENT_TOKEN_FILE
    secret_mount: /run/secrets/ajiasu/gateway-enrollment-token
    default_policy: one_time_secret_file
    modes: [development, single-host, external-dependencies]
    helm_value: gateway.enrollment.secretKey
  - name: AJIASU_AGENT_CONTROL_PLANE_ENDPOINT
    owner: agent
    container_environment: AJIASU_AGENT_CONTROL_PLANE_ENDPOINT
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: agent.controlPlaneEndpoint
  - name: AJIASU_AGENT_NODE_NAME
    owner: agent
    container_environment: AJIASU_AGENT_NODE_NAME
    secret_mount: null
    default_policy: generated_from_environment_id
    modes: [development, single-host, external-dependencies]
    helm_value: agent.nodeName
  - name: AJIASU_AGENT_STATE_DIRECTORY
    owner: agent
    container_environment: AJIASU_AGENT_STATE_DIRECTORY
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: agent.state.mountPath
  - name: AJIASU_AGENT_RELAY_BIND
    owner: agent
    container_environment: AJIASU_AGENT_RELAY_BIND
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: agent.relay.bind
  - name: AJIASU_AGENT_RELAY_CERT_FILE
    owner: agent
    container_environment: AJIASU_AGENT_RELAY_CERT_FILE
    secret_mount: null
    default_policy: generated_certificate_file
    modes: [single-host, external-dependencies]
    helm_value: agent.relay.certificatePath
  - name: AJIASU_AGENT_RELAY_KEY_FILE
    owner: agent
    container_environment: AJIASU_AGENT_RELAY_KEY_FILE
    secret_mount: /run/secrets/ajiasu/agent-relay-private-key
    default_policy: generated_secret_file
    modes: [single-host, external-dependencies]
    helm_value: agent.relay.privateKeySecretKey
  - name: AJIASU_AGENT_RELAY_CLIENT_CA_FILE
    owner: agent
    container_environment: AJIASU_AGENT_RELAY_CLIENT_CA_FILE
    secret_mount: null
    default_policy: generated_ca_file
    modes: [single-host, external-dependencies]
    helm_value: agent.relay.clientCaPath
  - name: AJIASU_AGENT_RELAY_DIRECTORY
    owner: agent
    container_environment: AJIASU_AGENT_RELAY_DIRECTORY
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: agent.relay.directory
  - name: AJIASU_AGENT_ROUTE_VERIFYING_KEY_FILE
    owner: agent
    container_environment: AJIASU_AGENT_ROUTE_VERIFYING_KEY_FILE
    secret_mount: null
    default_policy: generated_public_key_file
    modes: [development, single-host, external-dependencies]
    helm_value: agent.routeVerifyingKey.path
  - name: AJIASU_AGENT_ENROLLMENT_TOKEN_FILE
    owner: agent
