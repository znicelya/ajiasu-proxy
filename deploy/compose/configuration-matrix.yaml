    helm_value: agent.runtime.kind
  - name: AJIASU_AGENT_VERSION
    owner: agent
    container_environment: AJIASU_AGENT_VERSION
    secret_mount: null
    default_policy: release_manifest
    modes: [development, single-host, external-dependencies]
    helm_value: agent.version
  - name: AJIASU_AGENT_SHUTDOWN_TIMEOUT
    owner: agent
    container_environment: AJIASU_AGENT_SHUTDOWN_TIMEOUT
    secret_mount: null
    default_policy: package_default
    modes: [development, single-host, external-dependencies]
    helm_value: agent.shutdownTimeout
  - name: AJIASU_DOCKER_SOCKET
    owner: agent
    container_environment: AJIASU_DOCKER_SOCKET
    secret_mount: null
    default_policy: host_discovery
    modes: [development, single-host, external-dependencies]
    helm_value: agent.runtime.dockerSocket
  - name: AJIASU_DOCKER_GID
    owner: agent
    container_environment: null
    secret_mount: null
    default_policy: host_discovery
    modes: [development, single-host, external-dependencies]
    helm_value: agent.runtime.dockerGroupId
