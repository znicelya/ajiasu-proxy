version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "sql/queries/platform.sql"
    gen:
      go:
        package: "dbgen"
        out: "internal/platform/database/dbgen"
        sql_package: "pgx/v5"
        emit_prepared_queries: false
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "pg_catalog.timestamp"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              type: "Time"
