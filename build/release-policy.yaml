policy_revision: 1
required_artifacts:
  - release-manifest.json
  - source-sbom.spdx.json
  - provenance.intoto.jsonl
  - signatures.bundle.json
immutable_images: true
keyless_signing: true
oidc_issuer: https://token.actions.githubusercontent.com
identity_pattern: ^https://github.com/znicelya/ajiasu-proxy/.github/workflows/release-hardening.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$
secret_artifact_patterns:
  - "*.pem"
  - "*.key"
  - "*password*"
  - "*secret*"
