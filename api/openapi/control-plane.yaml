      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    TenantIDQuery:
      name: tenant_id
      in: query
      required: false
      schema: {$ref: '#/components/schemas/UUID'}
    MembershipID:
      name: membership_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    BindingID:
