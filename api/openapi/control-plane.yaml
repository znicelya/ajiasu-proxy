openapi: 3.1.0
info:
  title: AJiaSu Control Plane API
  version: 1.0.0
  description: Phase 2 tenant, identity, and audit management API.
servers:
  - url: /
tags:
  - name: health
  - name: auth
  - name: tenants
  - name: service-identities
  - name: audit
paths:
  /livez:
    get:
      operationId: getLiveness
      tags: [health]
      responses:
        '200': {$ref: '#/components/responses/Health'}
  /readyz:
    get:
      operationId: getReadiness
      tags: [health]
      responses:
        '200': {$ref: '#/components/responses/Health'}
        '503': {$ref: '#/components/responses/Error'}
  /api/v1/auth/session:
    get:
      operationId: getSession
      tags: [auth]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200':
          description: Current authenticated principal.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Session'}
        '401': {$ref: '#/components/responses/Error'}
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      security: [{cookieAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      responses:
        '204': {description: Session revoked.}
        '400': {$ref: '#/components/responses/Error'}
        '403': {$ref: '#/components/responses/Error'}
  /api/v1/auth/oidc/login:
    get:
      operationId: beginOIDCLogin
      tags: [auth]
      parameters:
        - name: return_path
          in: query
          schema: {type: string, default: /}
      responses:
        '302': {description: Redirect to the configured OIDC provider.}
        '400': {$ref: '#/components/responses/Error'}
        '503': {$ref: '#/components/responses/Error'}
  /api/v1/auth/oidc/callback:
    get:
      operationId: completeOIDCLogin
      tags: [auth]
      parameters:
        - {name: state, in: query, required: true, schema: {type: string}}
        - {name: code, in: query, required: true, schema: {type: string}}
      responses:
        '302': {description: Session created and browser redirected.}
        '400': {$ref: '#/components/responses/Error'}
        '503': {$ref: '#/components/responses/Error'}
  /api/v1/auth/local/login:
    post:
      operationId: localLogin
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [identifier, password, second_factor]
              properties:
                identifier: {type: string}
                password: {type: string, format: password}
                second_factor: {type: string}
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SessionCreated'}
        '400': {$ref: '#/components/responses/Error'}
        '401': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/Cursor'}
        - {$ref: '#/components/parameters/PageSize'}
      responses:
        '200':
          description: Tenant page.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TenantList'}
        '400': {$ref: '#/components/responses/Error'}
        '403': {$ref: '#/components/responses/Error'}
    post:
      operationId: createTenant
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TenantCreate'}
      responses:
        '201':
          description: Tenant created.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Tenant'}
        '400': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}:
    parameters:
      - {$ref: '#/components/parameters/TenantID'}
    get:
      operationId: getTenant
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200':
          description: Tenant.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Tenant'}
        '404': {$ref: '#/components/responses/Error'}
    patch:
      operationId: updateTenant
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TenantPatch'}
      responses:
        '200':
          description: Tenant updated.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Tenant'}
        '400': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/members:
    parameters:
      - {$ref: '#/components/parameters/TenantID'}
    get:
      operationId: listMembers
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/Cursor'}
        - {$ref: '#/components/parameters/PageSize'}
      responses:
        '200':
          description: Membership page.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/MembershipList'}
        '403': {$ref: '#/components/responses/Error'}
    post:
      operationId: addMember
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [user_id]
              properties:
                user_id: {$ref: '#/components/schemas/UUID'}
      responses:
        '201':
          description: Membership created.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Membership'}
        '400': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/members/{membership_id}:
    parameters:
      - {$ref: '#/components/parameters/TenantID'}
      - {$ref: '#/components/parameters/MembershipID'}
    delete:
      operationId: removeMember
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      responses:
        '204': {description: Membership removed.}
        '400': {$ref: '#/components/responses/Error'}
        '403': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/role-bindings:
    parameters:
      - {$ref: '#/components/parameters/TenantID'}
    get:
      operationId: listRoleBindings
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/Cursor'}
        - {$ref: '#/components/parameters/PageSize'}
      responses:
        '200':
          description: Role binding page.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RoleBindingList'}
        '403': {$ref: '#/components/responses/Error'}
    post:
      operationId: grantRole
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [membership_id, role]
              properties:
                membership_id: {$ref: '#/components/schemas/UUID'}
                role: {$ref: '#/components/schemas/TenantRole'}
      responses:
        '201':
          description: Role binding created.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RoleBinding'}
        '400': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/role-bindings/{binding_id}:
    parameters:
      - {$ref: '#/components/parameters/TenantID'}
      - {$ref: '#/components/parameters/BindingID'}
    delete:
      operationId: revokeRole
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      responses:
        '204': {description: Role binding removed.}
        '400': {$ref: '#/components/responses/Error'}
        '403': {$ref: '#/components/responses/Error'}
  /api/v1/service-identities:
    get:
      operationId: listServiceIdentities
      tags: [service-identities]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/TenantIDQuery'}
        - {$ref: '#/components/parameters/Cursor'}
        - {$ref: '#/components/parameters/PageSize'}
      responses:
        '200':
          description: Service identity page.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ServiceIdentityList'}
        '403': {$ref: '#/components/responses/Error'}
    post:
      operationId: createServiceIdentity
      tags: [service-identities]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ServiceIdentityCreate'}
      responses:
        '201':
          description: Identity and initial one-time token.
          content:
            application/json:
              schema:
                type: object
                required: [service_identity, token]
                properties:
                  service_identity: {$ref: '#/components/schemas/ServiceIdentity'}
                  token: {$ref: '#/components/schemas/TokenCreated'}
        '400': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/service-identities/{id}/tokens:
    parameters:
      - {$ref: '#/components/parameters/ServiceIdentityID'}
      - {$ref: '#/components/parameters/TenantIDQuery'}
    post:
      operationId: issueServiceToken
      tags: [service-identities]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TokenIssue'}
      responses:
        '201':
          description: One-time plaintext token.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TokenCreated'}
        '400': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/service-identities/{id}/tokens/{token_id}:
    parameters:
      - {$ref: '#/components/parameters/ServiceIdentityID'}
      - {$ref: '#/components/parameters/TokenID'}
      - {$ref: '#/components/parameters/TenantIDQuery'}
    delete:
      operationId: revokeServiceToken
      tags: [service-identities]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/IdempotencyKey'}
        - {$ref: '#/components/parameters/CSRFToken'}
      responses:
        '204': {description: Token revoked.}
        '400': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/audit-events:
    get:
      operationId: listAuditEvents
      tags: [audit]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters:
        - {$ref: '#/components/parameters/TenantIDQuery'}
        - {$ref: '#/components/parameters/Cursor'}
        - {$ref: '#/components/parameters/PageSize'}
      responses:
        '200':
          description: Audit event page without high-risk details.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuditEventList'}
        '400': {$ref: '#/components/responses/Error'}
        '403': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/accounts:
    parameters: [{$ref: '#/components/parameters/TenantID'}]
    get:
      operationId: listAccounts
      tags: [accounts]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/Cursor'}, {$ref: '#/components/parameters/PageSize'}]
      responses:
        '200': {description: Account page., content: {application/json: {schema: {$ref: '#/components/schemas/AccountList'}}}}
        '403': {$ref: '#/components/responses/Error'}
    post:
      operationId: createAccount
      tags: [accounts]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/AccountCreate'}}}}
      responses:
        '201': {description: Account created without plaintext credential., content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/accounts/bulk-import:
    parameters: [{$ref: '#/components/parameters/TenantID'}]
    post:
      operationId: bulkImportAccounts
      tags: [accounts]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: false, required: [items], properties: {items: {type: array, minItems: 1, maxItems: 100, items: {$ref: '#/components/schemas/AccountCreate'}}}}}}
      responses:
        '200': {description: Ordered per-item results., content: {application/json: {schema: {$ref: '#/components/schemas/BulkImportResultList'}}}}
        '400': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/accounts/{account_id}:
    parameters: [{$ref: '#/components/parameters/TenantID'}, {$ref: '#/components/parameters/AccountID'}]
    get:
      operationId: getAccount
      tags: [accounts]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Safe account metadata., content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '404': {$ref: '#/components/responses/Error'}
    patch:
      operationId: updateAccount
      tags: [accounts]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/AccountPatch'}}}}
      responses:
        '200': {description: Account updated., content: {application/json: {schema: {$ref: '#/components/schemas/Account'}}}}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/accounts/{account_id}/credentials/rotate:
    parameters: [{$ref: '#/components/parameters/TenantID'}, {$ref: '#/components/parameters/AccountID'}]
    post:
      operationId: rotateAccountCredential
      tags: [accounts]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [credential], properties: {credential: {$ref: '#/components/schemas/CredentialInput'}}}}}}
      responses:
        '201': {description: Safe credential version metadata., content: {application/json: {schema: {$ref: '#/components/schemas/CredentialMetadata'}}}}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/tenants/{tenant_id}/account-pools:
    parameters: [{$ref: '#/components/parameters/TenantID'}]
    get:
      operationId: listAccountPools
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/Cursor'}, {$ref: '#/components/parameters/PageSize'}]
      responses:
        '200': {description: Pool page., content: {application/json: {schema: {$ref: '#/components/schemas/PoolList'}}}}
    post:
      operationId: createAccountPool
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PoolCreate'}}}}
      responses:
        '201': {description: Pool created., content: {application/json: {schema: {$ref: '#/components/schemas/Pool'}}}}
  /api/v1/tenants/{tenant_id}/account-pools/{pool_id}:
    parameters: [{$ref: '#/components/parameters/TenantID'}, {$ref: '#/components/parameters/PoolID'}]
    get:
      operationId: getAccountPool
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Pool., content: {application/json: {schema: {$ref: '#/components/schemas/Pool'}}}}
    patch:
      operationId: updateAccountPool
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PoolPatch'}}}}
      responses:
        '200': {description: Pool updated., content: {application/json: {schema: {$ref: '#/components/schemas/Pool'}}}}
  /api/v1/tenants/{tenant_id}/account-pools/{pool_id}/members:
    parameters: [{$ref: '#/components/parameters/TenantID'}, {$ref: '#/components/parameters/PoolID'}]
    get:
      operationId: listPoolMembers
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/Cursor'}, {$ref: '#/components/parameters/PageSize'}]
      responses:
        '200': {description: Membership page., content: {application/json: {schema: {$ref: '#/components/schemas/PoolMembershipList'}}}}
    post:
      operationId: addPoolMember
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PoolMembershipCreate'}}}}
      responses:
        '201': {description: Membership created., content: {application/json: {schema: {$ref: '#/components/schemas/PoolMembership'}}}}
  /api/v1/tenants/{tenant_id}/account-pools/{pool_id}/members/{membership_id}:
    parameters: [{$ref: '#/components/parameters/TenantID'}, {$ref: '#/components/parameters/PoolID'}, {$ref: '#/components/parameters/MembershipID'}]
    delete:
      operationId: removePoolMember
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      responses:
        '204': {description: Membership removed.}
  /api/v1/tenants/{tenant_id}/account-pools/{pool_id}/capacity:
    parameters: [{$ref: '#/components/parameters/TenantID'}, {$ref: '#/components/parameters/PoolID'}]
    get:
      operationId: getPoolCapacity
      tags: [account-pools]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Transactional capacity summary., content: {application/json: {schema: {$ref: '#/components/schemas/PoolCapacity'}}}}
  /api/v1/tenants/{tenant_id}/quota:
    parameters: [{$ref: '#/components/parameters/TenantID'}]
    get:
      operationId: getTenantQuota
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      responses:
        '200': {description: Tenant quota., content: {application/json: {schema: {$ref: '#/components/schemas/TenantQuota'}}}}
    patch:
      operationId: updateTenantQuota
      tags: [tenants]
      security: [{cookieAuth: []}, {bearerAuth: []}]
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}, {$ref: '#/components/parameters/CSRFToken'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TenantQuotaPatch'}}}}
      responses:
        '200': {description: Tenant quota updated., content: {application/json: {schema: {$ref: '#/components/schemas/TenantQuota'}}}}
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ajiasu_session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 1, maxLength: 255}
    CSRFToken:
      name: X-CSRF-Token
      in: header
      required: false
      schema: {type: string}
      description: Required for cookie-authenticated unsafe requests.
    Cursor:
      name: cursor
      in: query
      schema: {$ref: '#/components/schemas/Cursor'}
    PageSize:
      name: page_size
      in: query
      schema: {type: integer, minimum: 1, maximum: 200, default: 50}
    TenantID:
      name: tenant_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    TenantIDQuery:
      name: tenant_id
      in: query
      required: false
      schema: {$ref: '#/components/schemas/UUID'}
    MembershipID:
      name: membership_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    BindingID:
      name: binding_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    AccountID:
      name: account_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    PoolID:
      name: pool_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    ServiceIdentityID:
      name: id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    TokenID:
      name: token_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
  responses:
    Health:
      description: Health state.
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status: {type: string, const: ok}
    Error:
      description: Stable API error.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorEnvelope'}
  schemas:
    CredentialInput:
      type: object
      additionalProperties: false
      required: [username, password]
      properties: {username: {type: string, minLength: 1, maxLength: 512}, password: {type: string, minLength: 1, maxLength: 8192, writeOnly: true}}
    CredentialMetadata:
      type: object
      additionalProperties: false
      required: [version, provider, created_at]
      properties: {version: {type: integer, format: int64, minimum: 1}, provider: {type: string, enum: [envelope, vault, kms]}, created_at: {$ref: '#/components/schemas/RFC3339Time'}, retired_at: {anyOf: [{$ref: '#/components/schemas/RFC3339Time'}, {type: 'null'}]}}
    AccountCreate:
      type: object
      additionalProperties: false
      required: [name, credential]
      properties: {name: {type: string, minLength: 1, maxLength: 200}, membership_id: {type: string, maxLength: 512}, membership_expires_at: {$ref: '#/components/schemas/RFC3339Time'}, labels: {type: object, additionalProperties: {type: string}}, max_concurrency: {type: integer, minimum: 1, maximum: 32, default: 1}, credential: {$ref: '#/components/schemas/CredentialInput'}}
    AccountPatch:
      type: object
      additionalProperties: false
      required: [expected_version]
      properties: {expected_version: {type: integer, format: int64, minimum: 1}, name: {type: string}, state: {type: string, enum: [active, disabled, deleting]}, labels: {type: object, additionalProperties: {type: string}}, max_concurrency: {type: integer, minimum: 1, maximum: 32}}
    Account:
      type: object
      additionalProperties: false
      required: [id, tenant_id, name, state, health, labels, max_concurrency, version, credential, created_at, updated_at]
