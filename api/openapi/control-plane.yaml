      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    EndpointID:
      name: endpoint_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
    EnrollmentID:
      name: enrollment_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/UUID'}
