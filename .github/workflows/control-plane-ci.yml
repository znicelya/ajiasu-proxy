name: control-plane-ci

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - name: Verify control plane
        shell: pwsh
        run: ./scripts/control-plane-ci.ps1

  multiarch:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - name: Read image locks
        id: images
        shell: bash
        run: |
          set -euo pipefail
          source build/control-plane-images.lock
          [[ $GO_BUILD_IMAGE =~ ^golang:1\.25\.3-alpine3\.22@sha256:[0-9a-f]{64}$ ]]
          [[ $CONTROL_PLANE_RUNTIME_IMAGE =~ ^alpine:3\.22@sha256:[0-9a-f]{64}$ ]]
          printf 'build=%s\nruntime=%s\n' "$GO_BUILD_IMAGE" "$CONTROL_PLANE_RUNTIME_IMAGE" >>"$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.control-plane
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            GO_BUILD_IMAGE=${{ steps.images.outputs.build }}
            RUNTIME_IMAGE=${{ steps.images.outputs.runtime }}

  scan:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - name: Build architecture image
        shell: bash
        run: |
          set -euo pipefail
          source build/control-plane-images.lock
          docker buildx build --platform "linux/${{ matrix.arch }}" --load \
            --file Dockerfile.control-plane \
            --build-arg "GO_BUILD_IMAGE=$GO_BUILD_IMAGE" \
            --build-arg "RUNTIME_IMAGE=$CONTROL_PLANE_RUNTIME_IMAGE" \
            --tag "ajiasu-control-plane:scan-${{ matrix.arch }}" .
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ajiasu-control-plane:scan-${{ matrix.arch }}
          format: spdx-json
          output-file: ajiasu-control-plane-${{ matrix.arch }}.spdx.json
          artifact-name: ajiasu-control-plane-${{ matrix.arch }}.spdx.json
      - name: Scan high-severity vulnerabilities
        shell: bash
        run: |
          set -euo pipefail
          scanner='aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f'
          docker pull "$scanner"
          docker run --rm --pull=never \
            --mount type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock,readonly \
            "$scanner" image --image-src docker --scanners vuln --exit-code 1 \
            --ignore-unfixed --severity CRITICAL,HIGH \
            "ajiasu-control-plane:scan-${{ matrix.arch }}"
