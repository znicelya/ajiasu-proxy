name: runner-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          version: v0.35.0
          driver-opts: |
            image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - name: Verify runner
        shell: pwsh
        run: ./scripts/ci.ps1

  multiarch:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          version: v0.35.0
          driver-opts: |
            image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - name: Read Alpine image lock
        id: alpine
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t lines < <(grep -v '^[[:space:]]*$' runner/artifacts/alpine-3.22.lock)
          if [[ ${#lines[@]} -ne 1 || ! ${lines[0]} =~ ^ALPINE_IMAGE=(alpine:3\.22@sha256:[0-9a-f]{64})$ ]]; then
            echo 'invalid runner/artifacts/alpine-3.22.lock' >&2
            exit 1
          fi
          printf 'image=%s\n' "${BASH_REMATCH[1]}" >>"$GITHUB_OUTPUT"
      - name: Build multi-architecture image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            ALPINE_IMAGE=${{ steps.alpine.outputs.image }}

  scan:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          version: v0.35.0
          driver-opts: |
            image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - name: Read Alpine image lock
        id: alpine
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t lines < <(grep -v '^[[:space:]]*$' runner/artifacts/alpine-3.22.lock)
          if [[ ${#lines[@]} -ne 1 || ! ${lines[0]} =~ ^ALPINE_IMAGE=(alpine:3\.22@sha256:[0-9a-f]{64})$ ]]; then
            echo 'invalid runner/artifacts/alpine-3.22.lock' >&2
            exit 1
          fi
          printf 'image=%s\n' "${BASH_REMATCH[1]}" >>"$GITHUB_OUTPUT"
      - name: Build scan image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "linux/${{ matrix.arch }}" \
            --load \
            --build-arg "ALPINE_IMAGE=${{ steps.alpine.outputs.image }}" \
            --tag "ajiasu-runner:scan-${{ matrix.arch }}" \
            .
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ajiasu-runner:scan-${{ matrix.arch }}
          format: spdx-json
          output-file: ajiasu-runner-${{ matrix.arch }}.spdx.json
          artifact-name: ajiasu-runner-${{ matrix.arch }}.spdx.json
      - name: Scan image for high-severity vulnerabilities
        shell: bash
        run: |
          set -euo pipefail
          scanner='aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f'
          target_image='ajiasu-runner:scan-${{ matrix.arch }}'
          cache_volume='trivy-cache-${{ matrix.arch }}'

          for attempt in 1 2 3; do
            if docker pull "$scanner"; then
              break
            fi
            if [[ $attempt -eq 3 ]]; then
              exit 1
            fi
            sleep $((attempt * 2))
          done

          docker volume create "$cache_volume" >/dev/null
          trap 'docker volume rm "$cache_volume" >/dev/null 2>&1 || true' EXIT
          docker run --rm --pull=never \
            --mount type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock,readonly \
            --mount "type=volume,source=$cache_volume,target=/root/.cache/trivy" \
            "$scanner" image \
            --image-src docker \
            --scanners vuln \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            "$target_image"
